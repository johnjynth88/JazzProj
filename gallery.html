<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - BloomED</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body class="theme-light">
    <!-- Header -->
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-section">
                <div class="logo-icon">📚</div>
                <h1>BloomED</h1>
            </a>
            <div class="header-middle">
                <input type="text" class="search-box" placeholder="Search photos..." />
            </div>
            <div class="header-actions">
                <button class="action-btn" title="Back">←</button>
                <button class="action-btn" title="Settings">⚙️</button>
            </div>
            <button class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="flex-between mb-4">
            <h1>📸 Gallery</h1>
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="recent">Recent</button>
                <button class="filter-btn" data-filter="favorite">Favorites</button>
                <button class="filter-btn" data-filter="shared">Shared</button>
            </div>
        </div>

        <!-- View Options -->
        <div class="flex-between mb-4">
            <div>
                <button class="btn btn-outline" id="gridViewBtn">Grid</button>
                <button class="btn btn-outline" id="masonryViewBtn">Masonry</button>
                <button class="btn btn-outline" id="timelineViewBtn">Timeline</button>
            </div>
            <button class="btn btn-primary" id="uploadBtn">+ Upload</button>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">
                <div class="upload-text-main">Drag and drop images here</div>
                <div class="upload-text-sub">or click to select files</div>
            </div>
            <input type="file" id="fileInput" style="display: none;" multiple accept="image/*">
        </div>

        <!-- Gallery Container -->
        <div class="gallery-container" id="galleryContainer">
            <!-- Gallery items will be loaded here -->
        </div>

        <!-- Timeline View -->
        <div class="gallery-timeline" id="timelineView" style="display: none;">
            <!-- Timeline items will be loaded here -->
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightboxImage" class="lightbox-image" alt="">
        <span class="lightbox-close" id="lightboxClose">✕</span>
        <div class="lightbox-nav">
            <button class="lightbox-btn" id="lightboxPrev">← Previous</button>
            <span id="lightboxInfo"></span>
            <button class="lightbox-btn" id="lightboxNext">Next →</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        let currentView = 'grid';
        let currentFilter = 'all';
        let galleryImages = [];
        let currentImageIndex = 0;

        // Load images from storage
        function loadGallery() {
            galleryImages = StorageManager.getGalleryImages();
            renderGallery();
        }

        function renderGallery() {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = '';

            galleryImages.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item stagger-item';
                item.innerHTML = `
                    <img src="${img.data}" alt="${img.name}">
                    <div class="gallery-overlay">
                        <div class="gallery-info">
                            <button onclick="viewImage(${index})" title="View">👁️</button>
                            <button onclick="favoriteImage(${index})" title="Favorite">❤️</button>
                            <button onclick="downloadImage(${index})" title="Download">⬇️</button>
                            <button onclick="deleteImage(${index})" title="Delete">🗑️</button>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Upload Area
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('uploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.add('drag-over');
        });

        document.getElementById('uploadArea').addEventListener('dragleave', () => {
            document.getElementById('uploadArea').classList.remove('drag-over');
        });

        document.getElementById('uploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const image = {
                            name: file.name,
                            data: e.target.result,
                            date: new Date().toISOString(),
                            size: file.size,
                            favorite: false
                        };
                        StorageManager.addGalleryImage(image);
                        loadGallery();
                        Utils.showNotification('Image uploaded successfully!', 'success');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // View Image in Lightbox
        function viewImage(index) {
            currentImageIndex = index;
            const img = galleryImages[index];
            document.getElementById('lightboxImage').src = img.data;
            document.getElementById('lightboxInfo').textContent = `${index + 1} of ${galleryImages.length}`;
            document.getElementById('lightbox').classList.add('active');
        }

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('active');
        });

        document.getElementById('lightboxPrev').addEventListener('click', () => {
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            viewImage(currentImageIndex);
        });

        document.getElementById('lightboxNext').addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            viewImage(currentImageIndex);
        });

        // Favorite Image
        function favoriteImage(index) {
            const img = galleryImages[index];
            img.favorite = !img.favorite;
            StorageManager.getGalleryImages()[index] = img;
            loadGallery();
        }

        // Download Image
        function downloadImage(index) {
            const img = galleryImages[index];
            const link = document.createElement('a');
            link.href = img.data;
            link.download = img.name;
            link.click();
            Utils.showNotification('Image downloaded!', 'success');
        }

        // Delete Image
        function deleteImage(index) {
            if (confirm('Are you sure you want to delete this image?')) {
                StorageManager.deleteGalleryImage(galleryImages[index].id);
                loadGallery();
                Utils.showNotification('Image deleted!', 'success');
            }
        }

        // View Options
        document.getElementById('gridViewBtn').addEventListener('click', () => {
            currentView = 'grid';
            document.getElementById('galleryContainer').style.display = 'grid';
            document.getElementById('timelineView').style.display = 'none';
        });

        document.getElementById('masonryViewBtn').addEventListener('click', () => {
            currentView = 'masonry';
            document.getElementById('galleryContainer').classList.add('gallery-masonry');
            document.getElementById('timelineView').style.display = 'none';
        });

        document.getElementById('timelineViewBtn').addEventListener('click', () => {
            currentView = 'timeline';
            document.getElementById('galleryContainer').style.display = 'none';
            document.getElementById('timelineView').style.display = 'flex';
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!StorageManager.getUser()) {
                window.location.href = 'login.html';
                return;
            }
            loadGallery();
        });
    </script>
</body>
</html>
