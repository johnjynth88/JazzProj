<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BloomED</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="theme-light">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📚</div>
                <h1 class="login-title">Smart School</h1>
                <p class="login-subtitle">Learning Portal</p>
            </div>

            <!-- Tabs -->
            <div class="login-tabs">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="signupTab">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="tab-content active" id="loginContent">
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                        <span class="form-error" data-error="email"></span>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                        <span class="form-error" data-error="password"></span>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-submit">Sign In</button>
                </form>
            </div>

            <!-- Signup Form -->
            <div class="tab-content" id="signupContent">
                <form class="login-form" id="signupForm">
                    <!-- Row 1: Name -->
                    <div class="form-group form-group-full">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" name="name" placeholder="Enter your full name" required>
                        <span class="form-error" data-error="name"></span>
                    </div>

                    <!-- Row 2: Email & Age -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signupEmail">Email</label>
                            <input type="email" id="signupEmail" name="email" placeholder="Your email" required>
                            <span class="form-error" data-error="email"></span>
                        </div>
                        <div class="form-group">
                            <label for="signupAge">Age</label>
                            <input type="number" id="signupAge" name="age" placeholder="Age" min="5" max="25" required>
                            <span class="form-error" data-error="age"></span>
                        </div>
                    </div>

                    <!-- Row 3: Gender -->
                    <div class="form-group form-group-full">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="gender" value="male" required> Male
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="female"> Female
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="other"> Other
                            </label>
                        </div>
                        <span class="form-error" data-error="gender"></span>
                    </div>

                    <!-- Row 4: Class & Section -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signupClass">Class</label>
                            <select id="signupClass" name="class" required>
                                <option value="">Select Class</option>
                                <option value="1">Class 1</option>
                                <option value="2">Class 2</option>
                                <option value="3">Class 3</option>
                                <option value="4">Class 4</option>
                                <option value="5">Class 5</option>
                                <option value="6">Class 6</option>
                                <option value="7">Class 7</option>
                                <option value="8">Class 8</option>
                            </select>
                            <span class="form-error" data-error="class"></span>
                        </div>
                        <div class="form-group">
                            <label for="signupSection">Section</label>
                            <select id="signupSection" name="section" required>
                                <option value="">Select Section</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                            <span class="form-error" data-error="section"></span>
                        </div>
                    </div>

                    <!-- Row 5: School -->
                    <div class="form-group form-group-full">
                        <label for="signupSchool">School Name</label>
                        <input type="text" id="signupSchool" name="school" placeholder="Your school name" required>
                        <span class="form-error" data-error="school"></span>
                    </div>

                    <!-- Row 6: Parent Name -->
                    <div class="form-group form-group-full">
                        <label for="signupParent">Parent Name</label>
                        <input type="text" id="signupParent" name="parentName" placeholder="Parent name" required>
                        <span class="form-error" data-error="parentName"></span>
                    </div>

                    <!-- Row 7: Mobile -->
                    <div class="form-group form-group-full">
                        <label for="signupMobile">Mobile Number</label>
                        <input type="tel" id="signupMobile" name="mobileNumber" placeholder="10-digit number" required>
                        <span class="form-error" data-error="mobileNumber"></span>
                    </div>

                    <!-- Row 8: Profile Photo -->
                    <div class="form-group form-group-full">
                        <label>Profile Photo</label>
                        <div class="photo-upload" id="photoUpload">
                            <img id="photoPreview" class="photo-preview" alt="Preview">
                            <div class="photo-upload-text">
                                <div class="photo-upload-text-main">📸 Upload Photo</div>
                                <div class="photo-upload-text-sub">Click or drag to upload</div>
                            </div>
                            <input type="file" id="photoInput" style="display: none;" accept="image/*" name="profilePhoto">
                        </div>
                    </div>

                    <!-- Row 9: Password -->
                    <div class="form-group form-group-full">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" name="password" placeholder="Create a strong password" required>
                        <div class="password-requirements">
                            <div class="requirement-item" id="req-length">
                                <span class="requirement-icon">✓</span>
                                <span>At least 8 characters</span>
                            </div>
                            <div class="requirement-item" id="req-uppercase">
                                <span class="requirement-icon">✓</span>
                                <span>Uppercase letter</span>
                            </div>
                            <div class="requirement-item" id="req-number">
                                <span class="requirement-icon">✓</span>
                                <span>Number</span>
                            </div>
                        </div>
                        <span class="form-error" data-error="password"></span>
                    </div>

                    <!-- Row 10: Confirm Password -->
                    <div class="form-group form-group-full">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                        <span class="form-error" data-error="confirmPassword"></span>
                    </div>

                    <button type="submit" class="login-submit">Create Account</button>
                </form>
            </div>

            <div class="login-toggle">
                <p id="toggleText">Don't have an account? <span class="login-toggle-link" id="toggleLink">Sign Up</span></p>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/storage.js"></script>
    
    <script>
        // Tab switching
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginContent').classList.add('active');
            document.getElementById('signupContent').classList.remove('active');
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
            document.getElementById('toggleText').textContent = "Don't have an account? Sign Up";
            FormValidator.clearAllErrors();
        });

        document.getElementById('signupTab').addEventListener('click', () => {
            document.getElementById('signupContent').classList.add('active');
            document.getElementById('loginContent').classList.remove('active');
            document.getElementById('signupTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('toggleText').textContent = "Already have an account? Login";
            FormValidator.clearAllErrors();
        });

        document.getElementById('toggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            if (document.getElementById('loginContent').classList.contains('active')) {
                document.getElementById('signupTab').click();
            } else {
                document.getElementById('loginTab').click();
            }
        });

        // Photo upload
        document.getElementById('photoUpload').addEventListener('click', () => {
            document.getElementById('photoInput').click();
        });

        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('photoPreview');
                    preview.src = event.target.result;
                    preview.classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        // Password strength indicator
        document.getElementById('signupPassword').addEventListener('keyup', (e) => {
            const password = e.target.value;
            
            document.getElementById('req-length').classList.toggle('met', password.length >= 8);
            document.getElementById('req-uppercase').classList.toggle('met', /[A-Z]/.test(password));
            document.getElementById('req-number').classList.toggle('met', /[0-9]/.test(password));
        });

        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            FormValidator.clearAllErrors();
            
            const formData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            const validation = LoginValidator.validateLoginForm(formData);
            
            if (!validation.isValid) {
                Object.entries(validation.errors).forEach(([field, error]) => {
                    FormValidator.showFieldError(field, error);
                });
                return;
            }

            // Simulate login (in real app, this would be an API call)
            const userData = {
                id: Utils.generateId(),
                email: formData.email,
                loginDate: new Date().toISOString()
            };

            StorageManager.setUser(userData);
            Utils.showNotification('Login successful!', 'success');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });

        // Signup Form Submit
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            FormValidator.clearAllErrors();
            
            const formData = {
                name: document.getElementById('signupName').value,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value,
                confirmPassword: document.getElementById('signupConfirmPassword').value,
                age: document.getElementById('signupAge').value,
                gender: document.querySelector('input[name="gender"]:checked')?.value,
                class: document.getElementById('signupClass').value,
                section: document.getElementById('signupSection').value,
                school: document.getElementById('signupSchool').value,
                parentName: document.getElementById('signupParent').value,
                mobileNumber: document.getElementById('signupMobile').value
            };

            const validation = LoginValidator.validateSignupForm(formData);
            
            if (!validation.isValid) {
                Object.entries(validation.errors).forEach(([field, error]) => {
                    FormValidator.showFieldError(field, error);
                });
                return;
            }

            // Create new user account
            const userData = {
                id: Utils.generateId(),
                ...formData,
                registrationDate: new Date().toISOString(),
                profilePhoto: document.getElementById('photoPreview').src
            };

            StorageManager.setUser(userData);
            Utils.showNotification('Account created successfully!', 'success');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = StorageManager.getUser();
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
